{% extends "base.html" %}
{% block title %}Sign In — SaVi{% endblock %}

{% block content %}
<section class="auth-section">
  <div class="auth-card">
    <div class="auth-card__logo">
      <span class="logo-icon">S</span>
      <span>SaVi</span>
    </div>
    <h1 class="auth-card__title">Welcome back</h1>
    <p class="auth-card__sub">Sign in to your account</p>

    <form method="POST" class="auth-form" novalidate>
      <div class="form-group">
        <label for="email">Online ID / Email</label>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="Enter your email"
          required
          autocomplete="email"
        />
      </div>
      <div class="form-group">
        <label for="password">
          Passcode
          <a href="#" class="form-group__link">Forgot passcode?</a>
        </label>
        <div class="input-wrap">
          <input
            type="password"
            id="password"
            name="password"
            placeholder="Enter your passcode"
            required
            autocomplete="current-password"
          />
          <button type="button" class="input-wrap__toggle" data-target="password">Show</button>
        </div>
      </div>
      <div class="form-check">
        <input type="checkbox" id="remember" name="remember" />
        <label for="remember">Remember my Online ID</label>
      </div>
      <button type="submit" class="btn btn--primary btn--block btn--lg">Sign In</button>
    </form>

    <div class="auth-divider"><span>or</span></div>

    <div class="auth-alt">
      <p>New to SaVi?</p>
      <a href="{{ url_for('signup') }}" class="btn btn--outline btn--block">Open an Account</a>
    </div>

    <div class="auth-hint">
      <strong>Demo credentials:</strong> demo@savi.com / password123
    </div>
  </div>
</section>
{% endblock %}
